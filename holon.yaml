# ── Description ───────────────────────────────────────
description: |
  OP is the unified entry point to the Organic Programming ecosystem.
  It discovers holons — locally or over the network — and dispatches
  commands to them through a single interface. The actant installs one
  binary and gets access to every holon.
  
  OP does not implement domain logic. It routes.
skills:
  - name: discover-and-build
    description: Discover a holon, inspect its contract, and build it locally.
    when: User wants to find a holon in the workspace and turn it into a runnable artifact.
    steps:
      - Discover local holons with `op list .` or `op discover`
      - Inspect the contract with `op inspect <holon>`
      - Validate prerequisites with `op check <holon>`
      - Build and install with `op build <holon>` then `op install <holon>`
  - name: full-lifecycle
    description: Drive a holon through validation, build, test, run, and cleanup.
    when: User wants the complete Organic Programming lifecycle for a holon or recipe.
    steps:
      - Validate manifest and environment with `op check <holon>`
      - Build and test the artifact with `op build <holon>` and `op test <holon>`
      - Launch or dispatch with `op run <holon>` or `op <holon> <command>`
      - Clean and uninstall when finished with `op clean <holon>` and `op uninstall <holon>`
  - name: introspect-holon
    description: Inspect a holon's RPC contract, fields, and skills offline.
    when: User wants to understand a holon's API without running it.
    steps:
      - Run `op inspect <holon>` for human-readable proto docs
      - Use `op inspect <holon> --json` for machine-readable output
      - Fallback to `op inspect <host:port>` for a running holon via Describe RPC
  - name: expose-to-llm
    description: Expose any holon as MCP tools for LLM integration.
    when: User wants an AI agent to call holon RPCs.
    steps:
      - Start the MCP bridge with `op mcp <holon>`
      - Or export tool definitions with `op tools <holon> --format openai`
      - Skills from holon.yaml are exposed as MCP prompts alongside tools
  - name: manage-dependencies
    description: Manage holon dependencies like Go modules.
    when: User needs to add, update, or audit holon deps.
    steps:
      - Initialize with `op mod init <holon-path>`
      - Add dependencies with `op mod add <module> [version]`
      - Tidy and verify with `op mod tidy`
      - Inspect the graph with `op mod graph`

# ── Contract ──────────────────────────────────────────
contract:
  proto: protos/op/v1/op.proto
  service: OPService
  rpcs: [Discover, Invoke, CreateIdentity, ListIdentities, ShowIdentity]

# ── Operational ───────────────────────────────────────
kind: native
build:
  runner: go-module
  main: ./cmd/op
requires:
  commands: [go]
  files: [go.mod]
artifacts:
  binary: op
